syntax = "proto3";

package dev.cloud.proto.player;

import "common.proto";

option java_multiple_files = true;
option java_package = "dev.cloud.proto.player";
option java_outer_classname = "PlayerProto";

/**
 * Full player data as tracked by the master.
 */
message ProtoPlayer {
  dev.cloud.proto.common.ProtoUUID unique_id       = 1;
  string                           name            = 2;
  string                           current_service = 3;
  string                           proxy_name      = 4;
  string                           address         = 5;
}

message PlayerConnectRequest    { ProtoPlayer player  = 1; }
message PlayerDisconnectRequest { dev.cloud.proto.common.ProtoUUID unique_id = 1; }

message PlayerSwitchRequest {
  dev.cloud.proto.common.ProtoUUID unique_id       = 1;
  string                           previous_service = 2;
  string                           new_service      = 3;
}

/** Sent by the master to instruct a proxy to connect a player to a specific service. */
message SendPlayerRequest {
  dev.cloud.proto.common.ProtoUUID unique_id    = 1;
  string                           service_name = 2;
}

/** Sent by the master to instruct a proxy to kick a player. */
message KickPlayerRequest {
  dev.cloud.proto.common.ProtoUUID unique_id = 1;
  string                           reason    = 2;
}

/** Sent by the master to instruct a proxy to send a message to a player. */
message MessagePlayerRequest {
  dev.cloud.proto.common.ProtoUUID unique_id = 1;
  string                           message   = 2;
}

message GetPlayerRequest  { dev.cloud.proto.common.ProtoUUID unique_id = 1; }
message GetPlayerResponse { ProtoPlayer player = 1; }
message PlayerListResponse { repeated ProtoPlayer players = 1; }

/**
 * RPC service for proxies to push player events to the master.
 * Implemented by the master; called by proxy plugins.
 */
service PlayerReporter {

  /** Called by a proxy when a player connects to the network. */
  rpc ReportConnect(PlayerConnectRequest) returns (dev.cloud.proto.common.Empty);

  /** Called by a proxy when a player disconnects from the network. */
  rpc ReportDisconnect(PlayerDisconnectRequest) returns (dev.cloud.proto.common.Empty);

  /** Called by a proxy when a player switches from one service to another. */
  rpc ReportSwitch(PlayerSwitchRequest) returns (dev.cloud.proto.common.Empty);
}

/**
 * RPC service for performing actions on players from the master side.
 * Implemented by proxy plugins; called by the master.
 */
service PlayerExecutorService {

  /** Instructs the proxy to connect a player to a different service. */
  rpc SendPlayer(SendPlayerRequest) returns (dev.cloud.proto.common.Response);

  /** Instructs the proxy to kick a player with a reason. */
  rpc KickPlayer(KickPlayerRequest) returns (dev.cloud.proto.common.Response);

  /** Instructs the proxy to send a chat message to a player. */
  rpc MessagePlayer(MessagePlayerRequest) returns (dev.cloud.proto.common.Response);
}

/**
 * RPC service for querying player data from the master.
 * Implemented by the master; called by nodes and plugins.
 */
service PlayerQueryService {

  /** Returns the current data for a single online player. */
  rpc GetPlayer(GetPlayerRequest) returns (GetPlayerResponse);

  /** Returns all players currently connected to the network. */
  rpc ListPlayers(dev.cloud.proto.common.Empty) returns (PlayerListResponse);
}