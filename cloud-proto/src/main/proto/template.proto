syntax = "proto3";

package dev.cloud.proto.template;

import "common.proto";

option java_multiple_files = true;
option java_package = "dev.cloud.proto.template";
option java_outer_classname = "TemplateProto";

/**
 * Metadata about a template stored on the master.
 */
message ProtoTemplate {
  string name         = 1;
  string storage_type = 2;  // "LOCAL", "FTP", "S3"
  string path         = 3;
  string checksum     = 4;
  int64  size_bytes   = 5;
}

/**
 * A single chunk of binary data from a template file transfer.
 * Files are split into chunks and streamed to avoid memory pressure.
 */
message TemplateChunk {
  string template_name = 1;
  string relative_path = 2;  // path of the file within the template directory
  int32  chunk_index   = 3;
  int32  total_chunks  = 4;
  bytes  data          = 5;
  bool   last_chunk    = 6;
}

/**
 * Sent by a node to check whether its local template copy is up to date.
 */
message TemplateSyncRequest {
  string template_name      = 1;
  string local_checksum     = 2;  // empty if not cached locally
}

/**
 * Returned by the master to indicate whether a sync transfer is needed.
 */
message TemplateSyncResponse {
  bool   needs_update = 1;
  string checksum     = 2;
  int64  size_bytes   = 3;
}

message ListTemplatesResponse { repeated ProtoTemplate templates = 1; }
message GetTemplateRequest    { string template_name = 1; }
message GetTemplateResponse   { ProtoTemplate template = 1; }

/**
 * RPC service for template distribution from master to nodes.
 * Implemented by the master; called by nodes before starting a service.
 */
service TemplateService {

  /** Returns metadata about all registered templates. */
  rpc ListTemplates(dev.cloud.proto.common.Empty) returns (ListTemplatesResponse);

  /** Returns metadata for a single template by name. */
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);

  /**
   * Checks whether the node's local copy of a template is up to date.
   * The node sends its local checksum; the master responds with whether a transfer is needed.
   */
  rpc CheckSync(TemplateSyncRequest) returns (TemplateSyncResponse);

  /**
   * Streams a template's files to the requesting node as a sequence of {@link TemplateChunk} messages.
   * The node reassembles the chunks into a local directory before starting a service.
   */
  rpc DownloadTemplate(GetTemplateRequest) returns (stream TemplateChunk);
}