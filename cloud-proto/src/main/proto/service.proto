syntax = "proto3";

package dev.cloud.proto.service;

import "common.proto";

option java_multiple_files = true;
option java_package = "dev.cloud.proto.service";
option java_outer_classname = "ServiceProto";

/**
 * Sent by the master to a node to start a new service.
 */
message StartServiceRequest {
  dev.cloud.proto.common.ProtoUUID unique_id = 1;
  string                           service_name = 2;
  string                           group_name = 3;
  string                           template_name = 4;
  int32                            port = 5;
  int32                            memory = 6;  // MB
  string                           jvm_flags = 7;
  string                           docker_image = 8;
  string                           start_command = 9;
  dev.cloud.proto.common.Lifecycle lifecycle = 10;
  dev.cloud.proto.common.ServiceType service_type = 11;
}

/**
 * Returned by the node after attempting to start a service.
 */
message StartServiceResponse {
  bool   success = 1;
  string container_id = 2;
  string error = 3;  // empty on success
}

/**
 * Sent by the master to a node to stop a running service.
 */
message StopServiceRequest {
  string service_name = 1;
  string container_id = 2;
  bool   force = 3;  // true = kill immediately, false = graceful
}

/**
 * Sent by a node to the master to report a state change for a service.
 * Used for transitions like STARTING → ONLINE or ONLINE → STOPPED.
 */
message ServiceStateUpdate {
  string                             service_name = 1;
  dev.cloud.proto.common.ServiceState new_state = 2;
  string                             container_id = 3;
  int64                              timestamp = 4;
}

/**
 * Sent by a node to the master to report updated player counts for a service.
 */
message ServicePlayerUpdate {
  string service_name = 1;
  int32  online_count = 2;
}

/**
 * Sent by the master to a node to copy a running service's world/plugin data back
 * to its template (only relevant for STATIC services).
 */
message CopyServiceRequest {
  string service_name = 1;
  string template_name = 2;
}

/**
 * RPC service exposing service lifecycle operations.
 * Implemented by nodes; called by the master.
 */
service ServiceControl {

  /** Instructs the node to start a new service container. */
  rpc StartService(StartServiceRequest) returns (StartServiceResponse);

  /** Instructs the node to stop and remove a running service container. */
  rpc StopService(StopServiceRequest) returns (dev.cloud.proto.common.Response);

  /** Instructs the node to copy a service's files back to the template. */
  rpc CopyService(CopyServiceRequest) returns (dev.cloud.proto.common.Response);
}

/**
 * RPC service for nodes to push state and player updates to the master.
 * Implemented by the master; called by nodes.
 */
service ServiceReporter {

  /** Called by a node when a service transitions to a new state. */
  rpc ReportStateChange(ServiceStateUpdate) returns (dev.cloud.proto.common.Empty);

  /** Called by a node when a service's player count changes. */
  rpc ReportPlayerUpdate(ServicePlayerUpdate) returns (dev.cloud.proto.common.Empty);
}